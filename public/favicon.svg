<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Portfolio Harmonized Gradients -->
    <linearGradient id="p-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea" />
      <stop offset="50%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0a14" />
      <stop offset="100%" stop-color="#040307" />
    </linearGradient>
    <!-- Soft Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark glassmorphic base rounded square -->
  <rect width="512" height="512" rx="128" fill="url(#bg-gradient)" />
  
  <!-- Outer glowing accent ring -->
  <rect x="12" y="12" width="488" height="488" rx="116" fill="none" stroke="url(#p-gradient)" stroke-width="8" opacity="0.3" />

  <!-- Technical grid ticks (Creative Dev branding) -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="2">
    <line x1="128" y1="0" x2="128" y2="512" stroke-dasharray="10 15" />
    <line x1="384" y1="0" x2="384" y2="512" stroke-dasharray="10 15" />
    <line x1="0" y1="128" x2="512" y2="128" stroke-dasharray="10 15" />
    <line x1="0" y1="384" x2="512" y2="384" stroke-dasharray="10 15" />
  </g>

  <!-- Glowing neon base overlay of the stylized geometric P -->
  <g filter="url(#glow)" opacity="0.8">
    <!-- Main stem -->
    <rect x="156" y="116" width="40" height="280" rx="20" fill="url(#p-gradient)" />
    
    <!-- Outer loop -->
    <path d="M 176 136 C 265 136, 356 146, 356 220 C 356 294, 265 304, 176 304" 
          fill="none" 
          stroke="url(#p-gradient)" 
          stroke-width="40" 
          stroke-linecap="round" />
          
    <!-- Cybernetic terminal node (glowing junction) -->
    <circle cx="356" cy="220" r="16" fill="#ffffff" />
  </g>

  <!-- Crisp foreground vector layers -->
  <g>
    <!-- Crisp main stem -->
    <rect x="156" y="116" width="40" height="280" rx="20" fill="url(#p-gradient)" />
    
    <!-- Crisp outer loop -->
    <path d="M 176 136 C 265 136, 356 146, 356 220 C 356 294, 265 304, 176 304" 
          fill="none" 
          stroke="url(#p-gradient)" 
          stroke-width="40" 
          stroke-linecap="round" />
          
    <!-- Futuristic overlapping highlights (creates 3D depth) -->
    <path d="M 176 136 L 270 136" 
          fill="none" 
          stroke="#ffffff" 
          stroke-opacity="0.5" 
          stroke-width="8" 
          stroke-linecap="round" />
          
    <path d="M 176 304 L 230 304" 
          fill="none" 
          stroke="#ffffff" 
          stroke-opacity="0.3" 
          stroke-width="8" 
          stroke-linecap="round" />

    <!-- Pure white glowing nodes -->
    <circle cx="356" cy="220" r="10" fill="#ffffff" />
    <circle cx="176" cy="136" r="6" fill="#ffffff" />
  </g>
</svg>
