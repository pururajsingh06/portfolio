<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Graphite Mono Theme Gradients -->
    <linearGradient id="p-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="50%" stop-color="#333333" />
      <stop offset="100%" stop-color="#555555" />
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e0e0" />
    </linearGradient>
    <!-- Soft Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Clean minimalist base rounded square -->
  <rect width="512" height="512" rx="128" fill="url(#bg-gradient)" stroke="#cccccc" stroke-width="4" />
  
  <!-- Minimalist technical grid ticks -->
  <g opacity="0.1" stroke="#111111" stroke-width="2">
    <line x1="128" y1="0" x2="128" y2="512" stroke-dasharray="8 12" />
    <line x1="384" y1="0" x2="384" y2="512" stroke-dasharray="8 12" />
    <line x1="0" y1="128" x2="512" y2="128" stroke-dasharray="8 12" />
    <line x1="0" y1="384" x2="512" y2="384" stroke-dasharray="8 12" />
  </g>

  <!-- Crisp foreground vector layers with soft drop shadow -->
  <g filter="url(#shadow)">
    <!-- Crisp main stem -->
    <rect x="156" y="116" width="40" height="280" rx="20" fill="url(#p-gradient)" />
    
    <!-- Crisp outer loop -->
    <path d="M 176 136 C 265 136, 356 146, 356 220 C 356 294, 265 304, 176 304" 
          fill="none" 
          stroke="url(#p-gradient)" 
          stroke-width="40" 
          stroke-linecap="round" />
          
    <!-- Geometric overlap cuts (negative space) -->
    <path d="M 176 136 L 270 136" 
          fill="none" 
          stroke="#ffffff" 
          stroke-opacity="0.9" 
          stroke-width="6" 
          stroke-linecap="round" />
          
    <path d="M 176 304 L 230 304" 
          fill="none" 
          stroke="#ffffff" 
          stroke-opacity="0.9" 
          stroke-width="6" 
          stroke-linecap="round" />

    <!-- Technical nodes -->
    <circle cx="356" cy="220" r="10" fill="#ffffff" stroke="#111111" stroke-width="4" />
    <circle cx="176" cy="136" r="6" fill="#ffffff" />
  </g>
</svg>
